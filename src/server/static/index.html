<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nano-claw HTTP</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>nano-claw</h1>
        <div class="sidebar-actions">
          <button id="new-session-button" type="button">New Session</button>
          <button id="close-session-button" type="button">Close Session</button>
        </div>
      </div>
      <div id="session-list" class="session-list"></div>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 id="session-title">No Session Selected</h2>
            <p id="session-summary" class="muted">Create or choose a session to begin.</p>
          </div>
          <div id="run-status" class="status-chip">idle</div>
        </div>
        <div id="transcript" class="transcript"></div>
      </section>

      <section class="panel composer-panel">
        <form id="prompt-form">
          <label for="prompt-input">Prompt</label>
          <textarea id="prompt-input" rows="5" placeholder="Ask nano-claw to inspect the repo, edit code, or explain behavior."></textarea>
          <div class="actions">
            <button id="submit-button" type="submit">Send</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h3>Turn Activity</h3>
        </div>
        <div id="activity-log" class="activity-log"></div>
        <div id="turn-links" class="run-links"></div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
